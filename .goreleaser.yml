version: 2

builds:
  - main: ./cmd/scry
    binary: scry
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}

archives:
  - format: tar.gz
    name_template: "scry_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: alexivison
      name: homebrew-tap
    name: scry
    homepage: https://github.com/alexivison/scry
    description: "Minimal TUI for reviewing Git branch diffs"
    license: MIT
    install: |
      bin.install "scry"
